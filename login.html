<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobHunt - Login</title>
    <link rel="stylesheet" href="login&signup.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>

<body>
    <div class="company-logo" id="logo1">
        <img src="assets/amazon.png" alt="Company Logo 1">
        <span class="company-name">amazon</span>
    </div>
    <div class="company-logo" id="logo2">
        <img src="assets/google.png" alt="Company Logo 2">
        <span class="company-name">Google</span>
    </div>
    <div class="company-logo" id="logo3">
        <img src="assets/figma.png" alt="Company Logo 3">
        <span class="company-name">Figma</span>
    </div>
    <div class="company-logo" id="logo4">
        <img src="assets/microsoft.png" alt="Company Logo 4">
        <span class="company-name">Microsoft</span>
    </div>
    <div class="company-logo" id="logo5">
        <img src="assets/linkedin.png" alt="Company Logo 5">
        <span class="company-name">LinkedIn</span>
    </div>
    <div class="company-logo" id="logo6">
        <img src="assets/google.png" alt="Company Logo 6">
        <span class="company-name">Google</span>
    </div>

    <div class="container" id="login-container">
        <div class="logo">Job<span>Hunt</span></div>
        <div class="form" id="login-form">
            <h2>Login</h2>
            <form>
                <input type="text" placeholder="Username" required>
                <input type="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
            <p>New to JobHunt? <a href="signup.html">Create an account</a></p>
        </div>
    </div>

    <div id="ball" class="ball"></div>
    <script src="landsup.js"></script>
</body>

</html>
